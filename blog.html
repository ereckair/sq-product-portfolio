<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News & Blog — SQ Product Team</title>
  <meta name="description" content="Updates, releases, and product thinking from the Sourcing & Quality Product Team." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-light font-sans antialiased overflow-x-hidden" data-nav-theme="light" data-nav-active="news">

  <header id="site-header"></header>

  <main class="pt-24 md:pt-28">
    <section class="px-4 pb-12 text-center">
      <div class="max-w-3xl mx-auto">
        <p class="text-label text-black/40 mb-4">News & updates</p>
        <h1 class="text-display-light text-black mb-4">From the product team</h1>
        <p class="text-lg text-black/60 leading-relaxed">
          Releases, roadmap notes, and longer write-ups on the systems we build — SMMS, PIM, agents, quality, and more.
        </p>
      </div>
    </section>

    <section class="px-4 pb-8 sticky sticky-below-nav z-40 bg-white/90 backdrop-blur-sm border-b border-black/5">
      <div class="max-w-3xl mx-auto flex gap-2 overflow-x-auto py-3" id="blog-section-nav" role="navigation" aria-label="Content sections"></div>
    </section>

    <section class="px-4 pb-24">
      <div class="max-w-3xl mx-auto" id="blog-sections"></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="site-nav.js"></script>
  <script src="blog.js"></script>
  <script src="blog-page.js"></script>
</body>
</html>
