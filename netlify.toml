# Static portfolio — no build step
[build]
  publish = "."

[[headers]]
  for = "/pre-plm-agent/tutorial.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/docs/hrs/demo/hrs-demo.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/docs/xwork-nocode/demo/*.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/docs/xwork-open-capabilities/demo/*.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=604800"
